<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sea of Friends</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a1628;
      overflow: hidden;
      font-family: 'Georgia', serif;
      user-select: none;
    }

    #canvas { display: block; width: 100vw; height: 100vh; }

    /* ── Loading ─────────────────────────────────────────────── */
    #loading {
      position: fixed; inset: 0;
      background: #0a1628;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #c8a96e; z-index: 1000;
      gap: 1rem;
    }
    #loading h1 { font-size: 3.5rem; text-shadow: 0 0 30px #c8a96e88; letter-spacing: 0.05em; }
    #loading p  { opacity: 0.65; font-size: 1.1rem; }

    /* ── Name screen ─────────────────────────────────────────── */
    #name-screen {
      position: fixed; inset: 0;
      background: rgba(10, 22, 40, 0.93);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      color: #c8a96e; z-index: 900; gap: 1.2rem;
    }
    #name-screen h2 { font-size: 2.2rem; text-shadow: 0 0 20px #c8a96e66; }
    #name-screen p  { opacity: 0.6; font-size: 0.9rem; }
    #name-screen label { font-size: 0.78rem; opacity: 0.55; text-transform: uppercase; letter-spacing: 0.08em; align-self: flex-start; }
    #name-input, #room-input {
      padding: 0.55rem 1.2rem; font-size: 1.1rem;
      background: rgba(255,255,255,0.08); border: 2px solid #c8a96e;
      color: #fff; border-radius: 5px; text-align: center; outline: none;
      width: 260px;
    }
    #name-input { font-size: 1.3rem; }
    #name-input:focus, #room-input:focus { border-color: #e8c97e; box-shadow: 0 0 10px #c8a96e44; }
    #join-btn {
      padding: 0.55rem 2.5rem; background: #c8a96e; color: #0a1628;
      border: none; border-radius: 5px; font-size: 1.1rem;
      cursor: pointer; font-family: inherit; font-weight: bold;
      transition: background 0.2s;
    }
    #join-btn:hover { background: #e8c97e; }
    #join-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── HUD ─────────────────────────────────────────────────── */
    #hud { position: fixed; inset: 0; pointer-events: none; z-index: 100; }

    #hud-top-right {
      position: absolute; top: 1rem; right: 1rem;
      display: flex; align-items: center; gap: 0.5rem;
      pointer-events: all;
    }

    #peer-count {
      color: #c8a96e; background: rgba(0,0,0,0.55);
      padding: 0.45rem 1rem; border-radius: 5px; font-size: 0.9rem;
      border: 1px solid rgba(200,169,110,0.25);
      white-space: nowrap;
    }

    /* ── Latency list ────────────────────────────────────────── */
    #latency-list {
      position: absolute; top: 3.6rem; right: 1rem;
      min-width: 160px;
      background: rgba(0,0,0,0.55); border-radius: 5px;
      border: 1px solid rgba(200,169,110,0.25);
      overflow: hidden;
      display: none;
    }
    #latency-list-title {
      padding: 0.3rem 0.8rem;
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em;
      color: rgba(200,169,110,0.6);
      border-bottom: 1px solid rgba(200,169,110,0.15);
    }
    .latency-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.25rem 0.8rem; gap: 1.2rem;
      font-size: 0.8rem; color: #ddd;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .latency-row:last-child { border-bottom: none; }
    .latency-row-ms {
      color: #4caf50; font-size: 0.75rem; white-space: nowrap;
    }

    #compass {
      position: absolute; top: 1rem; left: 50%; transform: translateX(-50%);
      color: #c8a96e; background: rgba(0,0,0,0.55);
      padding: 0.35rem 1.2rem; border-radius: 5px; font-size: 0.9rem;
      border: 1px solid rgba(200,169,110,0.25);
      letter-spacing: 0.08em;
    }

    #speed-bar {
      position: absolute; bottom: 6rem; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 0.6rem;
      color: #c8a96e; font-size: 0.8rem;
    }
    #speed-fill {
      width: 100px; height: 8px; background: rgba(255,255,255,0.15);
      border-radius: 4px; overflow: hidden;
      border: 1px solid rgba(200,169,110,0.3);
    }
    #speed-fill-inner {
      height: 100%; background: #c8a96e; border-radius: 4px;
      transition: width 0.15s;
    }

    /* ── Chat ────────────────────────────────────────────────── */
    #chat-box {
      position: absolute; bottom: 1rem; left: 1rem;
      width: min(560px, calc(100vw - 2rem));
      pointer-events: all;
    }

    /* Tab bar */
    #chat-tabs {
      display: flex;
      gap: 2px;
      padding: 0 4px;
      align-items: flex-end;
    }
    .chat-tab {
      padding: 4px 14px 5px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(200,169,110,0.2);
      border-bottom: none;
      border-radius: 5px 5px 0 0;
      color: rgba(200,169,110,0.5);
      font-size: 0.75rem;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .chat-tab:hover {
      background: rgba(0,0,0,0.75);
      color: rgba(200,169,110,0.85);
    }
    .chat-tab.active {
      background: rgba(0,0,0,0.65);
      color: #c8a96e;
      border-color: rgba(200,169,110,0.35);
    }
    .chat-tab-badge {
      display: inline-block;
      background: #c8352a;
      color: #fff;
      font-size: 0.62rem;
      padding: 0 4px;
      border-radius: 8px;
      min-width: 14px;
      text-align: center;
      vertical-align: middle;
      margin-left: 3px;
      line-height: 1.4;
    }
    .chat-tab-badge:empty { display: none; }

    #chat-messages {
      height: 260px; overflow-y: auto;
      background: rgba(0,0,0,0.65); padding: 0.6rem 0.9rem;
      border-radius: 0; color: #ddd; font-size: 0.88rem;
      line-height: 1.55; border: 1px solid rgba(200,169,110,0.2);
      border-bottom: none;
    }

    /* Tab-based message filtering */
    #chat-box[data-tab="crew"]   [data-type="system"] { display: none; }
    #chat-box[data-tab="system"] [data-type="chat"]   { display: none; }

    .chat-ts {
      color: rgba(200,169,110,0.55); font-size: 0.75rem; margin-right: 0.35rem;
    }
    .chat-sys {
      color: #7ec8c8; font-style: italic;
    }
    .chat-emote {
      color: #d4a8d4; font-style: italic;
    }

    /* Command autocomplete hint */
    #chat-cmd-hint {
      display: none;
      background: rgba(10,22,40,0.96);
      border-left: 1px solid rgba(200,169,110,0.3);
      border-right: 1px solid rgba(200,169,110,0.3);
      border-top: 1px solid rgba(200,169,110,0.15);
    }
    #chat-cmd-hint.visible { display: block; }
    .cmd-hint-item {
      padding: 0.3rem 0.9rem;
      font-size: 0.8rem;
      color: #c8a96e;
      cursor: pointer;
      display: flex;
      gap: 0.5rem;
      align-items: baseline;
    }
    .cmd-hint-item:hover { background: rgba(200,169,110,0.12); }
    .cmd-hint-item .cmd-args { color: rgba(200,169,110,0.6); font-size: 0.74rem; }
    .cmd-hint-item .cmd-desc { color: rgba(255,255,255,0.45); font-size: 0.74rem; }

    #chat-input-row {
      display: flex; gap: 0;
      opacity: 0.45;
      transition: opacity 0.15s;
    }
    #chat-input-row.active { opacity: 1; }
    #chat-input {
      flex: 1; padding: 0.5rem 0.9rem;
      background: rgba(0,0,0,0.85); border: 1px solid #c8a96e;
      border-top: none; color: #fff; border-radius: 0 0 0 5px;
      font-size: 0.88rem; outline: none; font-family: inherit;
    }
    #chat-input::placeholder { color: rgba(255,255,255,0.3); }
    #chat-send {
      padding: 0.5rem 1.4rem; background: #c8a96e; color: #0a1628;
      border: none; border-radius: 0 0 5px 0; cursor: pointer;
      font-size: 0.88rem; font-family: inherit; font-weight: bold;
      white-space: nowrap;
    }
    #chat-send:hover { background: #e8c97e; }

    /* ── Controls hint ───────────────────────────────────────── */
    #controls-hint {
      position: absolute; bottom: 1rem; right: 1rem;
      color: rgba(200,169,110,0.65); font-size: 0.72rem; text-align: right;
      line-height: 1.7;
    }

    /* ── Player name labels ──────────────────────────────────── */
    .player-label {
      position: fixed; pointer-events: none;
      transform: translate(-50%, -100%);
      background: rgba(0,0,0,0.65); color: #fff;
      padding: 2px 8px; border-radius: 3px;
      font-size: 0.72rem; white-space: nowrap;
      z-index: 50; border: 1px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; gap: 5px;
    }
    .label-latency {
      color: #4caf50; font-size: 0.65rem; opacity: 0.85;
    }

    /* ── Chat bubble (floats above ship in 3-D space) ─────────── */
    .chat-bubble {
      position: fixed; pointer-events: none;
      transform: translate(-50%, -100%);
      background: rgba(0,0,0,0.78); color: #fff;
      padding: 5px 11px; border-radius: 12px;
      font-size: 0.78rem; max-width: 220px;
      text-align: center; word-break: break-word;
      z-index: 55; border: 1px solid rgba(255,255,255,0.22);
      line-height: 1.4;
      transition: opacity 0.6s ease;
    }
    .chat-bubble::after {
      content: '';
      position: absolute; top: 100%; left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: rgba(0,0,0,0.78);
    }
    .chat-bubble.emote { color: #d4a8d4; font-style: italic; }
    .chat-bubble.fading { opacity: 0; }

    /* ── Network status ──────────────────────────────────────── */
    #net-status {
      position: absolute; top: 1rem; left: 1rem;
      color: #4caf50; font-size: 0.75rem; opacity: 0.7;
    }

    /* ── Voice chat ──────────────────────────────────────────── */
    #voice-btn {
      background: rgba(0,0,0,0.55); border: 1px solid rgba(200,169,110,0.25);
      color: #c8a96e; padding: 0.4rem 0.75rem; border-radius: 5px;
      font-size: 1rem; cursor: pointer; pointer-events: all;
      transition: background 0.2s;
      user-select: none;
    }
    #voice-btn:hover { background: rgba(0,0,0,0.75); }
    #voice-btn.active { color: #4caf50; border-color: rgba(76,175,80,0.4); }
    #voice-btn.muted  { color: #f44336; border-color: rgba(244,67,54,0.4); }

    #voice-panel {
      position: absolute; top: 3.5rem; right: 1rem;
      background: rgba(10,22,40,0.92); border: 1px solid rgba(200,169,110,0.3);
      border-radius: 6px; padding: 0.9rem 1rem; width: 230px;
      color: #c8a96e; font-size: 0.82rem; pointer-events: all;
      display: none; flex-direction: column; gap: 0.65rem;
      z-index: 200;
    }
    #voice-panel.open { display: flex; }
    #voice-panel label { opacity: 0.65; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.07em; }
    #voice-device-select {
      width: 100%; padding: 0.3rem 0.5rem;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(200,169,110,0.4);
      color: #fff; border-radius: 4px; font-size: 0.8rem; outline: none;
    }
    #voice-mute-btn {
      padding: 0.35rem 0.7rem; border-radius: 4px; border: none;
      background: rgba(76,175,80,0.2); color: #4caf50;
      cursor: pointer; font-size: 0.82rem; font-family: inherit;
      transition: background 0.15s;
    }
    #voice-mute-btn.muted { background: rgba(244,67,54,0.2); color: #f44336; }
    #voice-level-bar {
      width: 100%; height: 5px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px; overflow: hidden;
      border: 1px solid rgba(200,169,110,0.2);
    }
    #voice-level-fill {
      height: 100%; background: #4caf50;
      border-radius: 3px; width: 0%;
      transition: width 0.06s ease;
    }
    #voice-ptt-btn {
      padding: 0.35rem 0.7rem; border-radius: 4px; border: none;
      background: rgba(200,169,110,0.1); color: rgba(200,169,110,0.75);
      cursor: pointer; font-size: 0.78rem; font-family: inherit;
      transition: background 0.15s;
      text-align: left;
    }
    #voice-ptt-btn:hover { background: rgba(200,169,110,0.2); }
    #voice-ptt-btn.ptt-on { background: rgba(76,175,80,0.15); color: #4caf50; }
    #voice-nearby {
      font-size: 0.78rem; opacity: 0.7; min-height: 1.1em;
    }

    /* ── PTT active indicator ────────────────────────────────── */
    #ptt-indicator {
      position: absolute; bottom: 9rem; left: 50%; transform: translateX(-50%);
      background: rgba(76,175,80,0.90); color: #fff;
      padding: 0.4rem 1.3rem; border-radius: 6px; font-size: 0.88rem;
      display: none; z-index: 200; pointer-events: none;
      border: 2px solid #4caf50; letter-spacing: 0.06em; font-weight: bold;
      box-shadow: 0 0 14px rgba(76,175,80,0.55);
      white-space: nowrap;
    }
    #ptt-indicator.active { display: block; }
  </style>
</head>
<body>
  <div id="loading">
    <h1>⚓ Sea of Friends</h1>
    <p>Connecting to the DHT network…</p>
  </div>

  <div id="name-screen">
    <h2>⚓ Enter the Sea</h2>
    <p>P2P · No servers · DHT peer discovery</p>
    <label for="name-input">Captain's name</label>
    <input id="name-input" type="text" placeholder="e.g. Blackbeard" maxlength="20" autocomplete="off" />
    <label for="room-input">Room code</label>
    <input id="room-input" type="text" placeholder="world-1 (share with friends)" maxlength="32" autocomplete="off" />
    <button id="join-btn">Set Sail!</button>
  </div>

  <canvas id="canvas"></canvas>

  <div id="hud" style="display:none">
    <div id="net-status">● DHT</div>
    <div id="hud-top-right">
      <button id="voice-btn" title="Voice chat">🎤</button>
      <div id="peer-count">⚓ 1 sailor</div>
    </div>
    <div id="latency-list">
      <div id="latency-list-title">📡 Crew Latency</div>
    </div>
    <div id="compass">N</div>
    <div id="speed-bar">
      <span>SPEED</span>
      <div id="speed-fill"><div id="speed-fill-inner" style="width:0%"></div></div>
    </div>
    <div id="chat-box" data-tab="all">
      <div id="chat-tabs">
        <button class="chat-tab active" data-tab="all">All</button>
        <button class="chat-tab" data-tab="crew">Crew <span class="chat-tab-badge" id="badge-crew"></span></button>
        <button class="chat-tab" data-tab="system">System <span class="chat-tab-badge" id="badge-system"></span></button>
      </div>
      <div id="chat-messages"></div>
      <div id="chat-cmd-hint"></div>
      <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder="Press Enter to chat… (/help for commands)" maxlength="120" />
        <button id="chat-send">Send</button>
      </div>
    </div>
    <div id="ptt-indicator">📢 TRANSMITTING</div>
    <div id="controls-hint">
      WASD – Sail &nbsp;|&nbsp; Mouse drag – Camera<br>
      Click canvas – Lock cursor &nbsp;|&nbsp; ESC – Unlock<br>
      Enter – Chat &nbsp;|&nbsp; 🎤 – Voice chat &nbsp;|&nbsp; V – Push to Talk
    </div>

    <!-- Voice chat controls -->
    <div id="voice-panel">
      <label>Voice chat</label>
      <button id="voice-mute-btn">🎤 Mic on</button>
      <div id="voice-level-bar" title="Microphone input level">
        <div id="voice-level-fill"></div>
      </div>
      <button id="voice-ptt-btn">🎙 Always On</button>
      <label for="voice-device-select">Input device</label>
      <select id="voice-device-select">
        <option value="">Default microphone</option>
      </select>
      <div id="voice-nearby"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
